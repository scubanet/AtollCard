name: AtollCard
options:
  bundleIdPrefix: com.weckherlin
  developmentLanguage: de
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
targets:
  AtollCard:
    type: application
    supportedDestinations: [iOS, macOS]
    sources: [AtollCard]
    dependencies:
      - package: Supabase
        product: Supabase
      - target: AtollCardWidget
        embed: true
        platformFilter: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weckherlin.atollcard
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        DEVELOPMENT_TEAM: XK8V89P2QV
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: AtollCard/AtollCard.entitlements
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
  AtollCardWidget:
    type: app-extension
    supportedDestinations: [iOS]
    sources:
      - AtollCardWidget
      - path: AtollCard/Shared/SharedCardSnapshot.swift
      - path: AtollCard/Shared/AtollAppGroup.swift
      - path: AtollCard/Shared/Color+Hex.swift
      - path: AtollCard/Features/Share/QRCodeGenerator.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weckherlin.atollcard.widget
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: AtollCardWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: AtollCardWidget/AtollCardWidget.entitlements
        DEVELOPMENT_TEAM: XK8V89P2QV
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
  AtollCardTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources: [AtollCardTests]
    dependencies:
      - target: AtollCard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
schemes:
  AtollCard:
    build:
      targets: { AtollCard: all }
    test:
      targets: [AtollCardTests]
