name: Deploy web profile

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/deploy-web.yml"]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build
        working-directory: web
        env:
          VITE_SUPABASE_URL: https://bhkeplfkuismwyfiqcga.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoa2VwbGZrdWlzbXd5ZmlxY2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjA2MTAsImV4cCI6MjA5ODIzNjYxMH0.SzH-0Cz_PWIOuESMI4IFz8Bq4Fs2oW4AtTadPehwPYs
        run: |
          npm ci
          npm test
          npm run build
          cp dist/index.html dist/404.html
          echo "card.atoll-os.com" > dist/CNAME

      - name: Push dist to atollcard-web
        env:
          DEPLOY_KEY: ${{ secrets.WEB_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy"
          git clone --depth 1 git@github.com:scubanet/atollcard-web.git out
          find out -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R web/dist/. out/
          cd out
          git config user.name "atollcard-ci"
          git config user.email "ci@atoll-os.com"
          git add -A
          git diff --cached --quiet && echo "no changes" || {
            git commit -m "deploy: web profile from ${GITHUB_SHA::7}"
            git push origin main
          }
